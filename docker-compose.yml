version: "3.8"

services:
  # ── Next.js Web App ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dooh.db
      - NEXT_PUBLIC_VISION_API_URL=http://${SERVER_IP:-localhost}:8000
    volumes:
      - sqlite-data:/data
      - web-uploads:/app/apps/web/public/uploads
    ports:
      - "3000:3000"
    depends_on:
      - vision

  # ── FastAPI Vision API ─────────────────────────────────────
  vision:
    build:
      context: apps/vision
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - vision-uploads:/app/uploads
      - vision-exports:/app/exports
      - vision-masks:/app/masks
      - sam-weights:/app/sam_weights
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 6G

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - web
      - vision

  # ── Certbot (SSL — optional) ───────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  sqlite-data:
  web-uploads:
  vision-uploads:
  vision-exports:
  vision-masks:
  sam-weights:
  certbot-etc:
  certbot-var:
