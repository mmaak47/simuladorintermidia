# ── Nginx reverse proxy for DOOH Simulator ───────────────────
# Routes: / → web:3000, /api/vision → vision:8000

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    set $web_upstream http://web:3000;
    set $vision_upstream http://vision:8000;

    client_max_body_size 200M;

    # ── Vision API ────────────────────────────────────────────
    location /api/vision/ {
        rewrite ^/api/vision/(.*)$ /$1 break;
        proxy_pass $vision_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/export/ {
        proxy_pass $vision_upstream/api/export/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Vision static files (uploads, masks, exports) ─────────
    location /files/ {
        proxy_pass $vision_upstream/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Vision health check ───────────────────────────────────
    location = /health {
        proxy_pass $vision_upstream/health;
    }

    # ── Next.js app (everything else) ─────────────────────────
    location / {
        proxy_pass $web_upstream;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
